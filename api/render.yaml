services:
  - type: web
    name: zorv-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ZORV_ADMIN_SECRET
        generateValue: true
      - key: ZORV_ADMIN_PASSWORD
        value: "admin123"
      - key: RENDER
        value: "true"
    plan: free
    healthCheckPath: /api/health
